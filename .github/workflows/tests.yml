name: Test motore (GDScript headless)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  engine-tests:
    name: Test del motore di gioco
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scarica Godot 4.6.3 (headless)
        run: |
          set -eux
          URL="https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip"
          wget -q "$URL" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64
          echo "GODOT=$PWD/Godot_v4.6.3-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Importa risorse (genera la cache delle classi)
        run: |
          set -eux
          # Prima apertura: Godot scansiona gli script e registra le classi
          # globali (class_name). Tollerante: alcune versioni terminano con
          # codice non-zero anche dopo un import riuscito.
          "$GODOT" --headless --path godot --import || true

      - name: Esegui i test
        run: |
          set -euxo pipefail
          "$GODOT" --headless --path godot res://tests/TestRunner.tscn 2>&1 | tee test_output.txt
          # Il codice di uscita di Godot va perso nella pipe: si valida l'output.
          # 1) Nessun errore di script (compilazione/parse/runtime).
          if grep -q "SCRIPT ERROR" test_output.txt; then
            echo "::error::Errori di script rilevati nell'output di Godot"
            exit 1
          fi
          # 2) Esito positivo esplicito dei test.
          grep -q "TEST_RESULT: PASS" test_output.txt

      - name: Smoke test della scena di gioco (HUD)
        run: |
          set -euxo pipefail
          # Istanzia Main.tscn con gli autoload attivi: cattura percorsi @onready
          # rotti o errori di struttura della HUD che i test del motore non vedono.
          "$GODOT" --headless --path godot --script res://tests/SceneCheck.gd 2>&1 | tee scene_output.txt
          if grep -q "SCRIPT ERROR" scene_output.txt; then
            echo "::error::Errori di script durante l'istanziazione di Main.tscn"
            exit 1
          fi
          grep -q "SCENE_RESULT: PASS" scene_output.txt

      - name: Smoke test delle pedine 3D (figure + badge)
        run: |
          set -euxo pipefail
          # Costruisce la mappa 3D e verifica numero di figure per pedina
          # (squadra 4, team 2, leader 1, arma 1), badge numerici e yaw di marcia.
          "$GODOT" --headless --path godot res://tests/Pieces3DCheck.tscn 2>&1 | tee pieces_output.txt
          if grep -q "SCRIPT ERROR" pieces_output.txt; then
            echo "::error::Errori di script nella costruzione delle pedine 3D"
            exit 1
          fi
          grep -q "PIECES_RESULT: PASS" pieces_output.txt

      - name: Smoke test della selezione (anteprima gruppo di comando)
        run: |
          set -euxo pipefail
          # Selezionando un leader si popola l'anteprima del gruppo di comando;
          # giocando un ordine l'anteprima si azzera.
          "$GODOT" --headless --path godot res://tests/SelectionCheck.tscn 2>&1 | tee selection_output.txt
          if grep -q "SCRIPT ERROR" selection_output.txt; then
            echo "::error::Errori di script nel test di selezione"
            exit 1
          fi
          grep -q "SELECTION_RESULT: PASS" selection_output.txt

      - name: Smoke test delle Azioni (whitelist + instradamento)
        run: |
          set -euxo pipefail
          # Le azioni accendibili hanno un handler reale; le no-op sono escluse;
          # la Sventagliata è instradata allo spray.
          "$GODOT" --headless --path godot res://tests/ActionsCheck.tscn 2>&1 | tee actions_output.txt
          if grep -q "SCRIPT ERROR" actions_output.txt; then
            echo "::error::Errori di script nel test delle Azioni"
            exit 1
          fi
          grep -q "ACTIONS_RESULT: PASS" actions_output.txt
