name: Esporta Godot e pubblica su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export:
    name: Esporta e pubblica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Esporta progetto Godot 4.3 → HTML5
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: >-
            https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: >-
            https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          cache: false
          export_debug: false

      # Godot 4 web export richiede SharedArrayBuffer → serve COOP/COEP.
      # GitHub Pages non aggiunge questi header, ma il ServiceWorker
      # incluso nel template Godot li emula a runtime.
      # Aggiungiamo anche un .nojekyll e un redirect index.html nella root.
      - name: Prepara cartella Pages
        run: |
          mkdir -p dist
          cp -r /home/runner/.local/share/godot/export/Web/. dist/
          touch dist/.nojekyll

      - name: Pubblica su GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
