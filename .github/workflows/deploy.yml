name: Esporta Godot e pubblica su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export:
    name: Esporta e pubblica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Esporta progetto Godot 4.3 → HTML5
        id: export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: >-
            https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: >-
            https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./godot
          archive_output: false
          cache: false
          export_debug: false

      # Godot 4 web export, se compilato coi thread, richiede SharedArrayBuffer
      # e dunque gli header COOP/COEP che GitHub Pages non fornisce.
      # Il coi-serviceworker li emula a runtime tramite un service worker.
      - name: Prepara cartella Pages
        run: |
          set -eux
          echo "Contenuto di build_directory:"
          ls -R "${{ steps.export.outputs.build_directory }}"
          mkdir -p dist
          cp -r "${{ steps.export.outputs.build_directory }}/Web/." dist/
          # Service worker per COOP/COEP (abilita SharedArrayBuffer su Pages)
          curl -sL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js \
            -o dist/coi-serviceworker.js
          # Inietta lo script come primo elemento del <head> di index.html
          sed -i 's#<head>#<head>\n\t<script src="coi-serviceworker.js"></script>#' dist/index.html
          touch dist/.nojekyll
          ls -la dist/

      - name: Pubblica su GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
